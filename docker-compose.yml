services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: pet_resort
      POSTGRES_PASSWORD: pet_resort
      POSTGRES_DB: pet_resort
    ports:
      - "127.0.0.1:54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pet_resort -d pet_resort"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - pet_resort_postgres:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: pet_resort_local
      MINIO_ROOT_PASSWORD: pet_resort_local_password
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - pet_resort_minio:/data

volumes:
  pet_resort_postgres:
  pet_resort_minio:
